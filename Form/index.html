<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Registration Form</title>
    <style>
        .form-container {
            max-width: 900px;
            margin: 40px auto;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e0e6ed;
            overflow: hidden;
        }

        .form-header {
            background-color: #fcfcfd;
            padding: 25px 40px;
            border-bottom: 1px solid #eff2f5;
            text-align: left;
        }

        .form-header h2 {
            margin: 0;
            color: #1a202c;
            font-size: 30px; 
        }

        .form-header p {
            margin: 5px 0 0;
            color: #718096;
            font-size: 20px; 
        }

        form {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 35px;
        }

        .section-title {
            font-weight: 700;
            font-size: 18px;
            color: #3182ce;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .section-number {
            background: #ebf8ff;
            padding: 5px 10px;
            border-radius: 4px;
            margin-right: 10px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 18px; 
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #0b4e96;
            border-radius: 6px;
            font-size: 18px; 
            box-sizing: border-box;
            outline: none;
            background: #fff;
        }

        .file-upload-box {
            padding: 15px;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            text-align: center;
        }

        .file-upload-box input {
            font-size: 18px;
            color: #718096;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 25px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3182ce;
        }

        .checkbox-group label {
            margin-left: 10px;
            margin-bottom: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .form-footer {
            display: flex;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid #edf2f7;
        }

        .btn-clear {
            flex: 1;
            padding: 14px;
            background: #f7fafc;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 18px;
        }

        .btn-submit {
            flex: 2;
            padding: 14px;
            background: #3182ce;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2);
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h2>Guest Registration Form</h2>
        <p>Ensure all fields are completed for a smooth check-in process.</p>
    </div>

    <form action="#" method="post">

        <div class="form-section">
            <div class="section-title">
                <span class="section-number">01</span> Personal Identity
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="John">
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" placeholder="Quincy">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Citizenship</label>
                    <input type="text" placeholder="e.g. Filipino">
                </div>
                <div class="form-group">
                    <label>Sex</label>
                    <select>
                        <option value="">Select Sex</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">
                <span class="section-number">02</span> Contact & Address
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Region</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Province</label>
                    <input type="text">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" placeholder="+63 900 000 0000">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">
                <span class="section-number">03</span> Stay Details
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Check-in Date</label>
                    <input type="date">
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <select>
                        <option>1 Night</option>
                        <option>2-3 Nights</option>
                        <option>More than 3 Nights</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Upload Government ID</label>
                <div class="file-upload-box">
                    <input type="file">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">I certify that the information above is true and correct.</label>
            </div>
        </div>

        <div class="form-footer">
            <button type="reset" class="btn-clear">Clear Form</button>
            <button type="submit" class="btn-submit">Confirm Reservation</button>
        </div>

    </form>
</div>

</body>
</html>
