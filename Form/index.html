<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Enrollment Form</title>
    <style>
        .form-container {
            max-width: 950px;
            margin: 40px auto;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 35, 163, 0.1);
            border: 1px solid #e0e6ed;
            overflow: hidden;
        }
        .form-header {
            background-color: #fcfcfd;
            padding: 25px 40px;
            border-bottom: 1px solid #042b52;
            text-align: center;
        }

        .form-header h2 {
            margin: 0;
            color: #1b6ba0;
            font-size: 28px; 
            text-transform: uppercase;
        }

        .form-header p {
            margin: 5px 0 0;
            color: #030303;
            font-size: 18px; 
        }
        form {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 35px;
        }

        .section-title {
            font-weight: 700;
            font-size: 18px;
            color: #2c5282;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ebf8ff;
            padding-bottom: 10px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 16px; 
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #08305a;
            border-radius: 6px;
            font-size: 17px; 
            box-sizing: border-box;
            outline: none;
            background: #ffffff;
        }

        input:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            height: 48px;
            align-items: center;
        }

        .radio-item {
            display: flex;
            align-items: center;
            font-size: 17px;
            cursor: pointer;
            color: #4a5568;
        }

        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            accent-color: #3182ce;
        }
        .checklist-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #edf2f7;
        }

        .check-item {
            display: flex;
            align-items: center;
            font-size: 15px;
            color: #4a5568;
        }

        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            accent-color: #3182ce;
            cursor: pointer;
        }
        .form-footer {
            display: flex;
            gap: 15px;
            padding-top: 30px;
            border-top: 1px solid #edf2f7;
        }

        .btn-clear {
            flex: 1;
            padding: 15px;
            background: #f7fafc;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 17px;
        }

        .btn-submit {
            flex: 2;
            padding: 15px;
            background: #2c5282;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 17px;
            box-shadow: 0 4px 12px rgba(44, 82, 130, 0.2);
        }

        .btn-submit:hover {
            background: #2a4365;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h2>Clark College Science And Technology <br> Enrollment Form</h2>
        <p>Academic Year 2026-2027</p>
    </div>

    <form action="#" method="post">

        <div class="form-section">
            <div class="section-title">01. Personal Profile</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Enter first name" required>
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" placeholder="Enter middle name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Enter last name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Birth Date</label>
                    <input type="date" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" placeholder="00" min="15">
                </div>
                <div class="form-group">
                    <label>Sex</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="sex" value="male"> Male</label>
                        <label class="radio-item"><input type="radio" name="sex" value="female"> Female</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label>Birthplace</label>
                    <input type="text" placeholder="City/Province">
                </div>
                <div class="form-group">
                    <label>Citizenship</label>
                    <input type="text" placeholder="e.g. Filipino">
                </div>
                <div class="form-group">
                    <label>Civil Status</label>
                    <select>
                        <option value="single">Single</option>
                        <option value="married">Married</option>
                        <option value="widowed">Widowed</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">02. Address & Contact Information</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Region</label>
                    <input type="text" placeholder="e.g. Region III">
                </div>
                <div class="form-group">
                    <label>Province</label>
                    <input type="text" placeholder="e.g. Tarlac">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>City / Municipality</label>
                    <input type="text" placeholder="Enter City">
                </div>
                <div class="form-group">
                    <label>Barangay</label>
                    <input type="text" placeholder="Enter Barangay">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label>House No. / Street / Village</label>
                    <input type="text" placeholder="123 Street Name, Phase 1">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" placeholder="+63 900 000 0000">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">03. Academic Details</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Course / Program</label>
                    <select required>
                        <option value="">Select a Course</option>
                        <option value="act">Associate in Computer Technology</option>
                        <option value="bshm">BS in Hospitality Management</option>
                        <option value="bsoa">BS in Office Administration</option>
                        <option value="ct">Computer Technology</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year Level</label>
                    <select required>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">04. Credentials Submitted</div>
            <label>Check all that apply:</label>
            <div class="checklist-grid">
                <label class="check-item"><input type="checkbox"> Form-138 (High School Card)</label>
                <label class="check-item"><input type="checkbox"> Form-137</label>
                <label class="check-item"><input type="checkbox"> Birth Certificate (PSA/NSO)</label>
                <label class="check-item"><input type="checkbox"> Good Moral Certificate</label>
                <label class="check-item"><input type="checkbox"> Certificate of Transfer Credentials</label>
                <label class="check-item"><input type="checkbox"> Transcript of Records (TOR)</label>
                <label class="check-item"><input type="checkbox"> Summer Permit / Permit to Cross Enroll</label>
                <label class="check-item"><input type="checkbox"> 2x2 Picture</label>
                <label class="check-item"><input type="checkbox"> PSA / NSO Original</label>
            </div>
        </div>

        <div class="form-footer">
            <button type="reset" class="btn-clear">Clear Form</button>
            <button type="submit" class="btn-submit">Submit Enrollment</button>
        </div>

    </form>
</div>

</body>
</html>
